# Serenity configuration — centralized test data and framework settings
# This file is read automatically by Serenity at startup.

# ==========================================================================
# WEBDRIVER CONFIGURATION
# ==========================================================================
webdriver {
  driver = chrome
  autodownload = true
  wait.for.timeout = 5000

  # Chrome arguments to disable password saving dialog and other modals
  chrome.arguments = "--disable-save-password-bubble --disable-popup-blocking --disable-prompt-on-repost --disable-infobars --disable-notifications"
}

headless.mode = false

# ==========================================================================
# SERENITY REPORTING
# ==========================================================================
serenity {
  project.name = "Serenity BDD Technical Test"
  take.screenshots = FOR_FAILURES
}

# ==========================================================================
# EXERCISE 1: UI TESTING (saucedemo.com)
# ==========================================================================
ui {
  base.url = "https://www.saucedemo.com"

  # Test Accounts
  standard.user = "standard_user"
  locked.user = "locked_out_user"
  problem.user = "problem_user"
  performance.user = "performance_glitch_user"

  # Shared password for all test accounts on saucedemo.com
  password = "secret_sauce"

  # Product Information
  product {
    backpack.name = "Sauce Labs Backpack"
    backpack.price = 29.99
    bike.light.name = "Sauce Labs Bike Light"
    bike.light.price = 9.99
  }
}
